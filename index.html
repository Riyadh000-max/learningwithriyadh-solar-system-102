<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System English Learning Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #818cf8;
            --primary-glow: rgba(129, 140, 248, 0.4);
            --secondary: #c084fc;
            --accent: #f472b6;
            --bg: #020617;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --panel-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        h1,
        h2,
        .orbitron {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 24px;
            pointer-events: auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10000;
        }

        .mobile-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            pointer-events: auto;
        }

        .nav-btn {
            background: rgba(129, 140, 248, 0.2);
            border: 1px solid var(--primary-glow);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            flex: 1;
            justify-content: center;
        }

        .nav-btn:hover {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        #hud {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            pointer-events: none;
        }

        #planet-info {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translate(-50%, 20px);
            width: 90%;
            max-width: 900px;
            height: 75vh;
            display: none;
            flex-direction: column;
            z-index: 20;
            opacity: 0;
        }

        #planet-info.active {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            padding: 4px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 15px;
            line-height: 1.6;
            font-size: 17px;
        }

        .content-area::-webkit-scrollbar {
            width: 5px;
        }

        .content-area::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .arabic {
            direction: rtl;
            font-family: 'Outfit', sans-serif;
            margin-top: 20px;
            color: var(--text-muted);
            background: rgba(129, 140, 248, 0.05);
            padding: 20px;
            border-radius: 12px;
            border-right: 4px solid var(--primary);
        }

        /* --- Audio Engine Styles --- */
        .speaker-btn {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid rgba(129, 140, 248, 0.2);
            color: #818cf8;
            cursor: pointer;
            font-size: 1em;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .speaker-btn:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        .speaker-btn.playing {
            animation: vocab-pulse 1s infinite;
            background: #22c55e;
            color: white;
            border-color: #22c55e;
        }

        @keyframes vocab-pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .vocab-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .vocab-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(129, 140, 248, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .context-sentence {
            font-size: 0.9em;
            color: #94a3b8;
            font-style: italic;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 12px;
            margin-top: 4px;
            line-height: 1.4;
        }

        .example-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: var(--accent);
            transform: rotate(90deg);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(129, 140, 248, 0.2);
            color: var(--primary);
            margin-bottom: 12px;
        }

        .points-display {
            font-size: 28px;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Practice Styling */
        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            text-align: left;
            cursor: pointer;
            transition: background 0.2s;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .option-btn.correct {
            background: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
        }

        .option-btn.wrong {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
        }

        [dir="rtl"] .option-btn {
            text-align: right;
        }

        @media (max-width: 600px) {
            #planet-info {
                height: 85vh;
                bottom: 20px;
                width: 95%;
                padding: 16px;
            }

            .vocab-grid {
                grid-template-columns: 1fr;
            }

            .function-columns {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .tab-btn {
                padding: 8px;
                font-size: 12px;
            }
        }

        .grammar-section {
            margin-bottom: 24px;
        }

        .grammar-label {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grammar-label::after {
            content: "";
            height: 1px;
            flex: 1;
            background: linear-gradient(to right, var(--primary-glow), transparent);
        }

        .formula-card {
            background: rgba(129, 140, 248, 0.1);
            border: 1px solid var(--primary-glow);
            padding: 16px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: white;
            margin-bottom: 16px;
        }

        .grammar-matrix {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .matrix-cell {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
        }

        .matrix-header {
            color: var(--primary);
            font-weight: 800;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .learning-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #ef4444;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 20000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            max-width: 90%;
            font-weight: 600;
        }

        .learning-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast-ar {
            display: block;
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.9;
        }

        /* --- Word Function Advanced Styles --- */
        .function-context {
            color: var(--primary);
            font-weight: 700;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .function-context::before {
            content: '';
            display: block;
            width: 30px;
            height: 2px;
            background: var(--primary);
            border-radius: 2px;
        }

        .function-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .function-col {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            line-height: 1.7;
        }

        .realtalk-section {
            background: rgba(129, 140, 248, 0.05);
            border: 1px dashed rgba(129, 140, 248, 0.2);
            border-radius: 16px;
            padding: 24px;
        }

        .realtalk-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85em;
            color: #818cf8;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
        }

        .realtalk-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .phrase-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .phrase-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .phrase-btn.playing {
            animation: vocab-pulse 1s infinite;
            background: #22c55e;
            border-color: #22c55e;
        }

        /* --- Dialogue Styles --- */
        .dialogue-section {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dialogue-bubble {
            display: flex;
            flex-direction: column;
            margin-bottom: 16px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border-left: 3px solid var(--primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .dialogue-bubble:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(5px);
        }

        .dialogue-speaker {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75em;
            color: var(--primary);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .dialogue-text {
            color: #fff;
            font-size: 1.05em;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dialogue-ar {
            color: var(--text-dim);
            font-size: 0.95em;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <div id="hud">
        <div class="glass-panel">
            <div class="status-badge">MISSION PROGRESS</div>
            <div class="points-display">TOTAL POINTS: <span id="total-points">0</span></div>
            <div id="planet-status" style="margin-top: 10px; font-size: 14px; opacity: 0.8;">
                Click a planet to start learning
            </div>
            <div class="mobile-controls">
                <button class="nav-btn" onclick="navPlanet(-1)">
                    <span>◀</span> PREV
                </button>
                <button class="nav-btn" onclick="navPlanet(1)">
                    NEXT <span>▶</span>
                </button>
            </div>
        </div>
    </div>

    <div id="planet-info" class="glass-panel">
        <button class="close-btn">&times;</button>
        <h2 id="planet-title" style="margin-bottom: 5px;">Planet Name</h2>
        <div id="planet-subtitle" style="opacity: 0.7; margin-bottom: 20px; font-size: 14px;">Focus Area</div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="grammar">Grammar</button>
            <button class="tab-btn" data-tab="vocabulary">Vocabulary</button>
            <button class="tab-btn" data-tab="function">Word Function</button>
            <button class="tab-btn" data-tab="practice">Practice</button>
        </div>

        <div id="tab-content" class="content-area">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script>
        // --- Data Structure ---
        const units = [
            {
                id: 1,
                name: "Good Morning!",
                focus: "Verb 'be' & Greetings",
                completedTabs: new Set(),
                grammar: {
                    noteEn: "In English, every sentence needs a verb. We use 'am', 'is', and 'are' to talk about who we are or how we feel. In Arabic, this verb is often hidden in the present tense, but in English, you must say it!",
                    noteAr: "في اللغة الإنجليزية، تحتاج كل جملة إلى فعل. نستخدم 'am' و 'is' و 'are' للتحدث عن هويتنا أو شعورنا. في اللغة العربية، غالباً ما يكون هذا الفعل مستتراً في المضارع، لكن في الإنجليزية يجب ذكره!",
                    form: [
                        "Affirmative (+): Subject + be (I am, You are, He/She is).",
                        "Negative (-): Add not after be (I am not, He is not).",
                        "Question (?): Move be to the start (Are you...?)."
                    ],
                    examples: [
                        "\"I am a student.\"",
                        "\"He is not a teacher.\"",
                        "\"Is she your friend?\""
                    ],
                    logic: [
                        "Identifies roles and names.",
                        "English sentences MUST have a verb.",
                        "Be links subjects to descriptors."
                    ]
                },
                practice: {
                    questions: [
                        { q: "What do you say to someone at 8:00 AM?", options: ["Good morning", "Good evening"], answer: 0, wrongEn: "Wrong! 8:00 AM is in the morning.", wrongAr: "خطأ! الساعة 8 صباحاً تكون في الصباح." },
                        { q: "___ name is Omar. Nice to meet you.", options: ["My", "His"], answer: 0, wrongEn: "Wrong! Use 'My' to introduce yourself.", wrongAr: "خطأ! استخدم 'My' لتقديم نفسك." },
                        { q: "How do you introduce a friend?", options: ["This is my friend, Ali", "I am Ali"], answer: 0, wrongEn: "Wrong! Use 'This is...' to introduce others.", wrongAr: "خطأ! استخدم 'This is...' لتقديم الآخرين." },
                        { q: "I use a ___ to write in my notebook.", options: ["Pencil", "Eraser"], answer: 0, wrongEn: "Wrong! We write with pencils, not erasers.", wrongAr: "خطأ! نحن نكتب بالأقلام الرصاص، وليس بالمساحات." },
                        { q: "\"Goodbye\" is a way to say hello.", options: ["True", "False"], answer: 1, wrongEn: "Wrong! 'Goodbye' is for leaving, not for hello.", wrongAr: "خطأ! 'Goodbye' للوداع وليس للتحية." },
                        { q: "A \"Classmate\" is a person in your school.", options: ["True", "False"], answer: 0, wrongEn: "Wrong! A classmate is definitely a student in your school.", wrongAr: "خطأ! زميل الدراسة هو بالتأكيد طالب في مدرستك." }
                    ]
                },
                vocabulary: {
                    list: [
                        { en: "Principal", ar: "مدير المدرسة", context: "The principal is in his office." },
                        { en: "Classmate", ar: "زميل دراسة", context: "Ali is my classmate in English." },
                        { en: "Teacher", ar: "معلم", context: "Mr. Ahmed is my math teacher." },
                        { en: "Student", ar: "طالب", context: "I am a student at the middle school." },
                        { en: "Alphabet", ar: "الحروف الأبجدية", context: "We learn the alphabet in Unit 1." },
                        { en: "Morning", ar: "صباح", context: "We say \"Good morning\" at 8:00 AM." },
                        { en: "Afternoon", ar: "بعد الظهر", context: "Class ends in the afternoon." },
                        { en: "Evening", ar: "مساء", context: "I do my homework in the evening." },
                        { en: "Friend", ar: "صديق", context: "This is my best friend, Omar." }
                    ]
                },
                function: {
                    context: "Meeting people for the first time or during different parts of the day.",
                    howEn: "In English, we use different greetings based on the time. Titles like Mr. and Mrs. are used with last names to show respect to teachers and adults. When meeting someone, \"Nice to meet you\" is the standard polite response.",
                    howAr: "في اللغة الإنجليزية، نستخدم تحيات مختلفة بناءً على الوقت. تُستخدم الألقاب مثل Mr. و Mrs. مع ألقاب العائلات لإظهار الاحترام للمعلمين والكبار. عند مقابلة شخص ما، تعتبر عبارة \"Nice to meet you\" هي الرد المهذب المعتاد.",
                    realTalk: ["How's it going?", "Nice to meet you", "Good morning"],
                    dialogue: [
                        { speaker: "A", text: "Good morning! How's it going?", ar: "صباح الخير! كيف تجري الأمور؟" },
                        { speaker: "B", text: "I'm fine, thanks. My name is Ali.", ar: "أنا بخير، شكراً. اسمي علي." },
                        { speaker: "A", text: "Nice to meet you, Ali. I'm Omar.", ar: "سعدت بلقائك يا علي. أنا عمر." }
                    ]
                }
            },
            {
                id: 2,
                name: "What Day Is Today?",
                focus: "Time Prepositions (In/On)",
                completedTabs: new Set(),
                grammar: {
                    noteEn: "Prepositions like 'in' and 'on' tell us exactly when something happens. Think of 'In' for big boxes of time (like months) and 'On' for specific points on a calendar (like days).",
                    noteAr: "حروف الجر مثل 'in' و 'on' تخبرنا متى يحدث الشيء بالضبط. فكر في 'In' للفترات الزمنية الكبيرة (مثل الشهور) و 'On' للنقاط المحددة في التقويم (مثل الأيام).",
                    form: [
                        "Affirmative (+): Event + is + in/on + Time.",
                        "Negative (-): Event + is not + Time.",
                        "Question (?): When is / What is...?"
                    ],
                    examples: [
                        "\"The test is on Monday.\"",
                        "\"It is not in June.\"",
                        "\"When is your birthday?\""
                    ],
                    logic: [
                        "Use 'In' for whole months.",
                        "Use 'On' only if you have a specific date like May 15th.",
                        "Time acts as a location."
                    ]
                },
                practice: {
                    questions: [
                        { q: "What day comes after Monday?", options: ["Sunday", "Tuesday"], answer: 1, wrongEn: "Wrong! Tuesday comes after Monday.", wrongAr: "خطأ! الثلاثاء يأتي بعد الاثنين." },
                        { q: "How do you write the number 12?", options: ["Two", "Twelve"], answer: 1, wrongEn: "Wrong! 12 is 'Twelve'.", wrongAr: "خطأ! الرقم 12 هو 'Twelve'." },
                        { q: "My birthday is ___ May.", options: ["On", "In"], answer: 1, wrongEn: "Wrong! Use 'In' for months.", wrongAr: "خطأ! استخدم 'In' للشهور." },
                        { q: "Your teacher says: \"___ your books to page 10.\"", options: ["Close", "Open"], answer: 1, wrongEn: "Wrong! You need to 'Open' the book to see the page.", wrongAr: "خطأ! يجب أن 'تفتح' الكتاب لترى الصفحة." },
                        { q: "January is the ___ month of the year.", options: ["Last", "First"], answer: 1, wrongEn: "Wrong! January is Month 1 (First).", wrongAr: "خطأ! يناير هو الشهر الأول." },

        // --- 3D Scene Setup ---
        const canvas = document.querySelector('#bg-canvas');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 60);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 2, 300);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);

        // Sun
        const sunGeometry = new THREE.SphereGeometry(5, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        // Planets
        // Planet Texture Generator
        function createPlanetTexture(color, number) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            // Base Color
            const hexColor = `#${color.toString(16).padStart(6, '0')}`;
            ctx.fillStyle = hexColor;
            ctx.fillRect(0, 0, 512, 512);

            // "Carved" Number Effect
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 5;
            ctx.shadowOffsetY = 5;

            ctx.fillStyle = 'rgba(0,0,0,0.6)'; // Inset look
            ctx.font = 'bold 240px Orbitron, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(number, 256, 256);

            // Shading for 3D feel on the label
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 4;
            ctx.strokeText(number, 256, 256);

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        const planetMeshes = [];
        const planetData = [
            { name: "Mercury", size: 0.8, dist: 10, speed: 0.02, color: 0xaaaaaa },
            { name: "Venus", size: 1.2, dist: 15, speed: 0.015, color: 0xe3bb76 },
            { name: "Earth", size: 1.3, dist: 20, speed: 0.01, color: 0x2233ff },
            { name: "Mars", size: 1.1, dist: 25, speed: 0.008, color: 0xff4422 },
            { name: "Jupiter", size: 3.5, dist: 35, speed: 0.005, color: 0xd39c7e },
            { name: "Saturn", size: 3.0, dist: 45, speed: 0.003, color: 0xc5ab6e },
            { name: "Uranus", size: 2.2, dist: 55, speed: 0.002, color: 0xbbeeff },
            { name: "Neptune", size: 2.1, dist: 65, speed: 0.001, color: 0x6081ff },
        ];

        planetData.forEach((data, index) => {
            const group = new THREE.Group();

            // Orbit Ring
            const orbitGeom = new THREE.RingGeometry(data.dist - 0.1, data.dist + 0.1, 64);
            const orbitMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.1, side: THREE.DoubleSide });
            const orbit = new THREE.Mesh(orbitGeom, orbitMat);
            orbit.rotation.x = Math.PI / 2;
            scene.add(orbit);

            // Planet Mesh
            const geom = new THREE.SphereGeometry(data.size, 32, 32);
            const texture = createPlanetTexture(data.color, index + 1);
            const mat = new THREE.MeshStandardMaterial({
                map: texture,
                roughness: 0.7,
                metalness: 0.2
            });
            const mesh = new THREE.Mesh(geom, mat);

            // Halo/Glow (Mastered state)
            const glowGeom = new THREE.SphereGeometry(data.size * 1.2, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({
                color: data.color,
                transparent: true,
                opacity: 0,
                side: THREE.BackSide
            });
            const glow = new THREE.Mesh(glowGeom, glowMat);
            mesh.add(glow);

            group.add(mesh);
            scene.add(group);

            planetMeshes.push({
                group,
                mesh,
                glow,
                dist: data.dist,
                speed: data.speed,
                angle: Math.random() * Math.PI * 2,
                unitIndex: index
            });
        });

        // Background Stars
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 5000;
        const posArray = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 400;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMaterial = new THREE.PointsMaterial({ size: 0.1, color: 0xffffff });
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // --- State ---
        let selectedPlanet = null;
        let totalPoints = 0;
        let isTransitioning = false;
        let isOrbitPaused = false; // For movement stability
        const tempVector = new THREE.Vector3();

        // Touch handling
        let touchStartX = 0;
        let touchStartY = 0;

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            handleInteraction(event.clientX, event.clientY);
        });

        window.addEventListener('touchstart', (event) => {
            touchStartX = event.touches[0].clientX;
            touchStartY = event.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchend', (event) => {
            if (event.changedTouches.length > 0) {
                const touchEndX = event.changedTouches[0].clientX;
                const touchEndY = event.changedTouches[0].clientY;

                // If it was a tap (not a drag)
                const dist = Math.sqrt(Math.pow(touchEndX - touchStartX, 2) + Math.pow(touchEndY - touchStartY, 2));
                if (dist < 10) {
                    handleInteraction(touchEndX, touchEndY);
                }
            }
        }, { passive: false });

        function handleInteraction(clientX, clientY) {
            if (isTransitioning) return;

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(planetMeshes.map(p => p.mesh));

            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const planet = planetMeshes.find(p => p.mesh === hit);
                selectPlanet(planet);
            }
        }

        function selectPlanet(planet) {
            if (selectedPlanet === planet) return;
            selectedPlanet = planet;
            isOrbitPaused = true; // Pause orbit when a planet is selected
            const unit = units[planet.unitIndex];

            document.getElementById('planet-title').innerText = unit.name;
            document.getElementById('planet-subtitle').innerText = unit.focus;
            const panel = document.getElementById('planet-info');
            panel.style.display = 'flex';
            setTimeout(() => panel.classList.add('active'), 10);

            renderTab('grammar');

            // Zoom camera
            controls.enabled = false;
            isTransitioning = true;
        }

        window.navPlanet = function (direction) {
            let currentIndex = selectedPlanet ? selectedPlanet.unitIndex : -1;
            let nextIndex = currentIndex + direction;

            if (nextIndex < 0) nextIndex = planetMeshes.length - 1;
            if (nextIndex >= planetMeshes.length) nextIndex = 0;

            selectPlanet(planetMeshes[nextIndex]);
        };

        document.querySelector('.close-btn').addEventListener('click', () => {
            const panel = document.getElementById('planet-info');
            panel.classList.remove('active');
            setTimeout(() => panel.style.display = 'none', 300);

            controls.enabled = true;

        // Tabs

                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

                renderTab(btn.dataset.tab);

                    </div>
                    
                    <div class="grammar-matrix">

                        </div>
                        <div class="matrix-cell">
                            <div class="matrix-header">Example / مثال</div>

                            <div class="matrix-header">Logic / المنطق</div>

                    <div class="grammar-note-card" style="margin-top:32px; border:1px dashed var(--primary); background:rgba(129, 140, 248, 0.05);">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <div style="font-weight:700; color:#818cf8;">READY TO PRACTICE?</div>
                                <div style="color:#94a3b8; font-size:0.9em;">Head over to the Practice tab to test your knowledge!</div>
                            </div>
                            <button class="option-btn" style="width:auto; padding:8px 20px;" onclick="document.querySelector('[data-tab=practice]').click()">Go to Practice</button>
                        </div>
                    </div>
                `;
            } else if (tabId === 'vocabulary') {
                content.innerHTML = `
                <div class="vocab-grid">
                    ${unit.vocabulary.list.map(v => `
                        <div class="vocab-card">

                                    <div style="font-size:1.2em; font-weight:700; color:#fff; margin-bottom:4px;">${v.en}</div>

                                </div>
                                <button class="speaker-btn" onclick="speakWord('${v.en.replace(/'/g, "\\'")}', this)">
                                    <span>🔊</span>

                            </div>
                            <div class="context-sentence">${v.context}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            } else if (tabId === 'function') {
                content.innerHTML = `
                <div class="function-context">
                    <span>Target Context: ${unit.function.context}</span>
                </div>
                
                <div class="function-columns">
                    <div class="function-col" style="color:#e2e8f0; font-size:1.05em;">
                        <div style="font-weight:700; font-size:0.75em; opacity:0.6; margin-bottom:10px; text-transform:uppercase;">English Explanation</div>
                        ${unit.function.howEn}
                    </div>
                    <div class="function-col" style="color:#94a3b8; font-size:1.05em;" dir="rtl">

                <div class="realtalk-section">
                    <div class="realtalk-header">
                        <span>REAL TALK PHRASES</span>
                        <span>اضغط للاستماع / Click to listen</span>
                    </div>
                    <div class="realtalk-grid">
                        ${unit.function.realTalk.map(p => `
                            <button class="phrase-btn" onclick="speakWord('${p.replace(/'/g, "\\'")}', this)">
                                <span>🔊</span> ${p}

                        `).join('')}
                    </div>
                </div>

                <div class="dialogue-section">
                    <div class="realtalk-header">
                        <span>REAL CONTEXT DIALOGUE</span>

                    </div>
                    ${unit.function.dialogue ? unit.function.dialogue.map(d => `
                        <div class="dialogue-bubble" onclick="speakWord('${d.text.replace(/'/g, "\\'")}', this)">
                            <div class="dialogue-speaker">${d.speaker}</div>
                            <div class="dialogue-text"><span>🔊</span> ${d.text}</div>
                            <div class="dialogue-ar" dir="rtl">${d.ar}</div>

            } else if (tabId === 'practice') {
                content.innerHTML = `
                    <div style="margin-top:10px;">
                        <div style="font-weight:700; color:#818cf8; margin-bottom:20px; font-family:'Orbitron', sans-serif; display:flex; justify-content:space-between; align-items:center;">
                            <span>MISSION PRACTICE</span>
                            <span dir="rtl">مهام التدريب</span>
                        </div>
                        <div class="practice-container">
                            ${unit.practice.questions.map((q, qIdx) => `
                                <div class="practice-card">
                                    <div class="question-text">${q.q}</div>
                                    <div class="options-grid">

                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            // Mark completion
            unit.completedTabs.add(tabId);
        }

        window.checkAnswer = function (btn, qIdx, oIdx) {
            const unit = units[selectedPlanet.unitIndex];
            const q = unit.practice.questions[qIdx];

            if (oIdx === q.answer) {
                btn.style.background = "#22c55e";
                btn.style.borderColor = "#22c55e";
                btn.style.color = "#fff";
                btn.style.transform = "scale(0.98)";
                btn.innerText = "✓ Correct!";

                // Add points
                updatePoints(10);

                // Confetti for correct answer
                confetti({
                    particleCount: 30,
                    spread: 40,
                    origin: { y: 0.6 },
                    colors: ['#818cf8', '#c084fc', '#22c55e']
                });
            } else {
                btn.style.background = "#ef4444";
                btn.style.borderColor = "#ef4444";
                btn.style.color = "#fff";
                showToast(q.wrongEn, q.wrongAr);
            }
        }

        function showToast(en, ar) {
            const toast = document.createElement('div');
            toast.className = 'learning-toast';
            toast.innerHTML = `
                <div>${en}</div>
                <div class="toast-ar">${ar}</div>
            `;
            document.body.appendChild(toast);

            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 100);

            // Remove after 5s
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 5000);
        }

        function updatePoints(val) {
            totalPoints += val;
            document.getElementById('total-points').innerText = totalPoints;

            // Check mastery
            const unit = units[selectedPlanet.unitIndex];
            if (unit.completedTabs.size >= 4) {
                selectedPlanet.glow.material.opacity = 0.5;
                // Celebration!
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#818cf8', '#c084fc', '#f472b6']
                });
            }
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            planetMeshes.forEach(p => {
                // Orbital movement - pause if isOrbitPaused is true
                if (!isOrbitPaused) {
                    p.angle += p.speed * 0.5;
                    p.group.position.x = Math.cos(p.angle) * p.dist;
                    p.group.position.z = Math.sin(p.angle) * p.dist;
                }

                p.mesh.rotation.y += 0.01;

                // Pulsate glow if mastered
                if (p.glow.material.opacity > 0) {
                    p.glow.scale.setScalar(1.2 + Math.sin(Date.now() * 0.005) * 0.1);
                    p.glow.material.opacity = 0.3 + Math.sin(Date.now() * 0.005) * 0.2;
                }
            });

            sun.rotation.y += 0.005;
            starField.rotation.y += 0.0001;

            if (selectedPlanet && isTransitioning) {
                // Smooth camera move to planet
                selectedPlanet.mesh.getWorldPosition(tempVector);
                const targetPos = tempVector.clone().add(new THREE.Vector3(0, 5, 8));
                camera.position.lerp(targetPos, 0.08);
                controls.target.lerp(tempVector, 0.08);
                if (camera.position.distanceTo(targetPos) < 0.01) isTransitioning = false;
            } else if (!selectedPlanet && isTransitioning) {
                // Return to home
                const homePos = new THREE.Vector3(0, 30, 60);
                const homeTarget = new THREE.Vector3(0, 0, 0);
                camera.position.lerp(homePos, 0.08);
                controls.target.lerp(homeTarget, 0.08);
                if (camera.position.distanceTo(homePos) < 0.01) isTransitioning = false;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.speakWord = function (text, btn) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.onstart = () => btn.classList.add('playing');
            utterance.onend = () => btn.classList.remove('playing');
            utterance.onerror = () => btn.classList.remove('playing');
            window.speechSynthesis.speak(utterance);
        };

        animate();

        // Responsive
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
