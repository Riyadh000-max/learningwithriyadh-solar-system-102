<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System English Learning Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>
    <canvas id="bg-canvas"></canvas>

    <div id="hud">
        <div class="glass-panel">
            <div class="status-badge">MISSION PROGRESS</div>
            <div class="points-display">TOTAL POINTS: <span id="total-points">0</span></div>
            <div id="planet-status" style="margin-top: 10px; font-size: 14px; opacity: 0.8;">
                Click a planet to start learning
            </div>
            <div class="mobile-controls">
                <button class="nav-btn" data-direction="-1">
                    <span>&#9664;</span> PREV
                </button>
                <button class="nav-btn" data-direction="1">
                    NEXT <span>&#9654;</span>
                </button>
            </div>
        </div>
    </div>

    <div id="planet-info" class="glass-panel">
        <button class="close-btn" aria-label="Close panel">&times;</button>
        <h2 id="planet-title" style="margin-bottom: 5px;">Planet Name</h2>
        <div id="planet-subtitle" style="opacity: 0.7; margin-bottom: 20px; font-size: 14px;">Focus Area</div>

        <div class="tabs" role="tablist">
            <button class="tab-btn active" role="tab" aria-selected="true" data-tab="grammar">Grammar</button>
            <button class="tab-btn" role="tab" aria-selected="false" data-tab="vocabulary">Vocabulary</button>
            <button class="tab-btn" role="tab" aria-selected="false" data-tab="function">Word Function</button>
            <button class="tab-btn" role="tab" aria-selected="false" data-tab="practice">Practice</button>
        </div>

        <div id="tab-content" class="content-area" role="tabpanel">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
